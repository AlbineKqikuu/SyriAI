<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecondChance | Live View</title>
    <link rel="stylesheet" href="./src/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
</head>

<body class="client-layout">
    <div class="client-cam">
        <video id="remote-video" autoplay playsinline style="width:100%; height:100%; object-fit:cover;"></video>
    </div>
    <div class="client-doc" id="doc-view">
        <canvas id="client-pointer-canvas"></canvas>
        <div id="file-content" style="padding:40px; font-size: 2rem; line-height:1.5;">
            <!-- Document content sync'd from admin -->
            Waiting for broadcast...
        </div>
    </div>

    <script type="module" src="./src/client.js"></script>
</body>

</html>
