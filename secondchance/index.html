<!DOCTYPE html>
<html lang="sq-AL">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SecondChance | Admin Control</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./src/style.css">
  <!-- MediaPipe dependencies -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <!-- XLSX and Mammoth -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js"></script>
  <!-- PDF.js -->
  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
</head>

<body>
  <div class="dashboard">
    <header>
      <div class="logo">SecondChance Studio</div>
      <div class="broadcast-status">
        <button class="btn btn-secondary" id="btn-draw-mode" style="margin-right: 10px;">🖊️ Draw Mode: OFF</button>
        <button class="btn" id="btn-live">🔴 GO LIVE</button>
      </div>
    </header>

    <aside class="sidebar">
      <h3>Files</h3>
      <div class="upload-section">
        <input type="file" id="file-input" accept=".pdf,.docx,.xlsx,.mp4,.avi,.mov" hidden>
        <button class="btn" onclick="document.getElementById('file-input').click()">📁 Open File</button>
      </div>
      <div id="file-list" class="file-list">
        <!-- Uploaded files will appear here -->
      </div>
      <div class="gestures-help">
        <p>👆 Index Point: Move Pointer</p>
        <p>✋ Palm: Erase All</p>
        <p>Keyboard: Up/Down to Scroll</p>
      </div>
    </aside>

    <main class="main-content">
      <div id="viewer-container">
        <!-- Rendered content here -->
        <canvas id="annotation-canvas"></canvas>
        <canvas id="pointer-canvas"></canvas>
        <div id="file-render-area"></div>
      </div>
    </main>

    <aside class="preview-container">
      <h3>Monitors</h3>
      <div class="cam-preview">
        <video id="cam-video" autoplay muted playsinline></video>
        <div class="gesture-status">Gestures: Active</div>
      </div>
      <div class="speech-preview">
        <p>Albanian Speech Status:</p>
        <div id="speech-indicator" style="color: var(--success)">Listening...</div>
      </div>
    </aside>

    <footer class="footer">
      <p id="now-reading">Reading: Idle</p>
    </footer>
  </div>

  <script type="module" src="./src/admin.js"></script>
</body>

</html>
