<!DOCTYPE html>
<html lang="sq">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyriAI Client - Studio View</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- MediaPipe Hands & Utils -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>
    <style>
        body {
            display: flex;
            flex-direction: row;
            height: 100vh;
            width: 100vw;
            margin: 0;
            padding: 0;
            background: #000;
        }

        .client-split-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .camera-half {
            flex: 1;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 2px solid var(--glass-border);
        }

        #client-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        .text-half {
            flex: 1;
            background: var(--bg-color);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .client-scroll-container {
            flex: 1;
            overflow-y: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            /* Initial center alignment */
            padding: 0 2rem;
            position: relative;
        }

        #client-script-display {
            font-size: 3.5rem;
            line-height: 1.4;
            font-weight: 600;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: pre-wrap;
            text-align: center;
        }

        .client-header {
            position: absolute;
            top: 2rem;
            left: 2rem;
            right: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .client-logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .client-clock {
            font-family: 'Courier New', monospace;
            font-size: 1.2rem;
            color: var(--accent-color);
        }

        /* Marker for the reading line */
        .reading-marker {
            position: absolute;
            left: 0;
            right: 0;
            top: 50%;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--accent-color), transparent);
            box-shadow: 0 0 20px var(--accent-color);
            z-index: 100;
            opacity: 0.8;
            pointer-events: none;
            transform: translateY(-50%);
        }

        /* Override style.css word highlights for client view */
        .word-span {
            display: inline-block;
            transition: all 0.3s ease;
            margin: 0 0.2em;
        }

        .highlight {
            color: #fff !important;
            background: #007aff !important;
            box-shadow: 0 0 40px rgba(0, 122, 255, 0.8), 0 0 10px #fff;
            border-radius: 8px;
            padding: 0 10px;
            transform: scale(1.1) !important;
            z-index: 50;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .read {
            opacity: 0.3;
        }
    </style>
</head>

<body>
    <div class="client-split-container">
        <div class="camera-half">
            <video id="client-video" autoplay playsinline></video>
            <div class="client-clock" id="client-time"
                style="position: absolute; bottom: 1rem; left: 1rem; background: rgba(0,0,0,0.5); padding: 0.5rem; border-radius: 8px;">
                00:00:00</div>
        </div>
        <div class="text-half">
            <div class="client-header">
                <div class="client-logo" style="display: flex; align-items: center; gap: 10px;">
                    <div
                        style="width: 12px; height: 12px; border-radius: 50%; background: var(--danger-color); box-shadow: 0 0 10px var(--danger-color); animation: pulse 1.5s infinite;">
                    </div>
                    SyriAI LIVE
                </div>
                <div id="connection-indicator"
                    style="width: 12px; height: 12px; border-radius: 50%; background: var(--success-color); box-shadow: 0 0 10px var(--success-color);">
                </div>
            </div>
            <div id="reading-marker" class="reading-marker"></div>
            <div class="client-scroll-container" id="client-scroll-box">
                <div id="client-script-display">Pret skriptin nga Admin...</div>
            </div>
            <!-- Drawing Glass Overlay -->
            <canvas id="drawglass"
                style="position: absolute; top:0; left:0; width:100%; height:100%; pointer-events: none; z-index: 5000;"></canvas>
            <!-- Hand Cursor Feedback Overlay (Clears every frame for smoothness) -->
            <canvas id="hand-cursor"
                style="position: absolute; top:0; left:0; width:100%; height:100%; pointer-events: none; z-index: 5100;"></canvas>

            <div id="hand-status"
                style="position: absolute; bottom: 1.5rem; right: 1.5rem; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); padding: 0.6rem 1rem; border-radius: 12px; font-size: 0.8rem; z-index: 300; color: #fff; border: 1px solid var(--glass-border); display: none;">
                Hand Active</div>

            <!-- Client Visual Slide Panel -->
            <div id="client-slide-area" class="client-slide-area" style="display: none;">
                <canvas id="client-slide-canvas"></canvas>
            </div>
        </div>
    </div>

    <!-- LOWER THIRDS OVERLAY -->
    <div id="lower-third" class="lower-third-banner" style="display: none;">
        <div class="lt-gradient"></div>
        <div class="lt-content">
            <div class="lt-name" id="lt-name-display">EMRI JUAJ</div>
            <div class="lt-title" id="lt-title-display">Gazetar / Prezantues</div>
        </div>
        <div class="lt-logo">Syri<span>AI</span></div>
    </div>

    <script src="client.js"></script>
</body>

</html>
